<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/branding/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/branding/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/branding/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/branding/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Heimdall helps marketing teams plan campaigns, manage approvals, automate publishing, and measure performance in one workspace." />
    <meta name="theme-color" content="#f7f2ed" />
    <script>
      (() => {
        const key = "heimdall-theme";
        const stored = localStorage.getItem(key);
        const theme = stored === "light" || stored === "dark"
          ? stored
          : window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
        document.documentElement.classList.add(theme);
      })();
    </script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    
    <title>Heimdall | Marketing Command Center</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
