openapi: 3.1.0
info:
  title: Heimdall API
  version: 0.1.0
  description: |
    Heimdall is a centralized social media management platform that brings 
    multiple social platforms into one unified dashboard.
    
    ## Features
    - Multi-platform social media management
    - Content planning and scheduling
    - Analytics and performance insights
    - AI-powered content generation
    - Team collaboration
    
    ## Authentication
    Most endpoints require authentication via Bearer token in the Authorization header.
  contact:
    name: Heimdall API Support
    email: api@heimdall.dev
  license:
    name: MIT
    identifier: MIT

servers:
  - url: http://localhost:8080
    description: Local development server
  - url: https://api.heimdall.dev
    description: Production server (future)

tags:
  - name: Health
    description: Health check and status endpoints
  - name: Auth
    description: Authentication and authorization
  - name: Workspaces
    description: Multi-tenant workspace management
  - name: Resources
    description: Workspace-scoped reusable media and capability registry
  - name: Posts
    description: Social media post management
  - name: Scheduling
    description: Content scheduling and calendar
  - name: Analytics
    description: Performance analytics and insights
  - name: Integrations
    description: Social platform integrations

paths:
  /api/v1/health:
    get:
      operationId: getHealth
      summary: Health Check
      description: Returns the health status of the API including uptime and system information.
      tags:
        - Health
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: healthy
                timestamp: "2026-03-06T12:00:00Z"
                uptime: "2h30m15s"
                version: "0.1.0"
                go:
                  version: "go1.24"
                  os: "darwin"
                  arch: "arm64"
                  num_cpu: 10
                  goroutines: 8
                checks:
                  api: "ok"
  /api/v1/resources/capabilities:
    get:
      operationId: getResourceCapabilities
      summary: List Resource Capabilities
      tags:
        - Resources
      security:
        - BearerAuth: []
      parameters:
        - in: header
          name: X-Workspace-ID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Resource capability matrix
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceCapabilityMatrix'
  /api/v1/resources:
    get:
      operationId: listResources
      summary: List Resources
      tags:
        - Resources
      security:
        - BearerAuth: []
      parameters:
        - in: header
          name: X-Workspace-ID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Workspace resources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceListResponse'
    post:
      operationId: uploadResource
      summary: Upload Resource
      tags:
        - Resources
      security:
        - BearerAuth: []
      parameters:
        - in: header
          name: X-Workspace-ID
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                displayName:
                  type: string
                sourceType:
                  type: string
                optimize:
                  type: boolean
                transformRecipe:
                  type: string
      responses:
        '201':
          description: Uploaded resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceUploadResponse'
  /api/v1/resources/{id}:
    get:
      operationId: getResource
      summary: Get Resource
      tags:
        - Resources
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Resource detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceDetail'
    patch:
      operationId: updateResource
      summary: Update Resource
      tags:
        - Resources
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
    delete:
      operationId: deleteResource
      summary: Delete Resource
      tags:
        - Resources
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Resource queued for cleanup
  /api/v1/resources/{id}/download:
    get:
      operationId: downloadResource
      summary: Download Resource
      tags:
        - Resources
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '302':
          description: Redirects to a signed blob URL
  /api/v1/resources/{id}/variants:
    post:
      operationId: createResourceVariant
      summary: Create Resource Variant
      tags:
        - Resources
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                displayName:
                  type: string
                optimize:
                  type: boolean
                transformRecipe:
                  type: string
  /api/v1/resource-sets:
    get:
      operationId: listResourceSets
      summary: List Resource Sets
      tags:
        - Resources
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
      responses:
        '200':
          description: Workspace asset sets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceSetListResponse'
    post:
      operationId: createResourceSet
      summary: Create Resource Set
      tags:
        - Resources
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceSetUpsert'
      responses:
        '201':
          description: Created asset set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceSetDetail'
  /api/v1/resource-sets/{id}:
    get:
      operationId: getResourceSet
      summary: Get Resource Set
      tags:
        - Resources
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Resource set detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceSetDetail'
    patch:
      operationId: updateResourceSet
      summary: Update Resource Set
      tags:
        - Resources
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceSetUpdate'
      responses:
        '200':
          description: Updated resource set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceSetDetail'
    delete:
      operationId: deleteResourceSet
      summary: Delete Resource Set
      tags:
        - Resources
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Resource set deleted
  /api/v1/resource-sets/{id}/items:
    put:
      operationId: replaceResourceSetItems
      summary: Replace Resource Set Items
      tags:
        - Resources
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/ResourceSetItemInput'
      responses:
        '200':
          description: Updated resource set membership
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceSetDetail'
  /api/v1/posts:
    get:
      operationId: listPosts
      summary: List Posts
      tags:
        - Posts
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
      responses:
        '200':
          description: Workspace posts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostListResponse'
    post:
      operationId: createPost
      summary: Create Post
      tags:
        - Posts
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostUpsert'
      responses:
        '201':
          description: Created post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDetail'
  /api/v1/posts/{id}:
    get:
      operationId: getPost
      summary: Get Post
      tags:
        - Posts
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Post detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDetail'
    patch:
      operationId: updatePost
      summary: Update Post
      tags:
        - Posts
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostUpsert'
      responses:
        '200':
          description: Updated post
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDetail'
    delete:
      operationId: deletePost
      summary: Delete Post
      tags:
        - Posts
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Post deleted
  /api/v1/posts/{id}/assets:
    put:
      operationId: syncPostAssets
      summary: Replace Generic Post Assets
      tags:
        - Posts
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostAssetSync'
      responses:
        '200':
          description: Post detail with updated assets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDetail'
  /api/v1/posts/{id}/variants:
    post:
      operationId: createPostVariant
      summary: Create Post Variant
      tags:
        - Posts
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostVariantUpsert'
      responses:
        '201':
          description: Created post variant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostVariant'
  /api/v1/posts/variants/{variantId}:
    get:
      operationId: getPostVariant
      summary: Get Post Variant
      tags:
        - Posts
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/VariantId'
      responses:
        '200':
          description: Post variant detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostVariant'
    patch:
      operationId: updatePostVariant
      summary: Update Post Variant
      tags:
        - Posts
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/VariantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostVariantUpsert'
      responses:
        '200':
          description: Updated post variant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostVariant'
    delete:
      operationId: deletePostVariant
      summary: Delete Post Variant
      tags:
        - Posts
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/VariantId'
      responses:
        '204':
          description: Variant deleted
  /api/v1/posts/variants/{variantId}/assets:
    put:
      operationId: syncPostVariantAssets
      summary: Replace Variant Assets
      tags:
        - Posts
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/VariantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostVariantAssetSync'
      responses:
        '200':
          description: Updated post variant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostVariant'
  /api/v1/posts/variants/{variantId}/reviews/submit:
    post:
      operationId: submitPostVariantReview
      summary: Submit Variant For Review
      tags:
        - Posts
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/VariantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostReviewInput'
      responses:
        '200':
          description: Updated post variant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostVariant'
  /api/v1/posts/variants/{variantId}/reviews/decision:
    post:
      operationId: decidePostVariantReview
      summary: Decide Variant Review
      tags:
        - Posts
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/VariantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostReviewDecisionInput'
      responses:
        '200':
          description: Updated post variant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostVariant'
  /api/v1/posts/variants/{variantId}/publication/schedule:
    post:
      operationId: schedulePostVariantPublication
      summary: Schedule Variant Publication
      tags:
        - Posts
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/VariantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostPublicationSchedule'
      responses:
        '200':
          description: Updated publication plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostPublication'
  /api/v1/posts/variants/{variantId}/publication/unschedule:
    post:
      operationId: unschedulePostVariantPublication
      summary: Unschedule Variant Publication
      tags:
        - Posts
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/VariantId'
      responses:
        '200':
          description: Updated publication plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostPublication'
  /api/v1/posts/variants/{variantId}/publication/record-published:
    post:
      operationId: recordPostVariantPublication
      summary: Record Variant As Published
      tags:
        - Posts
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/VariantId'
      responses:
        '200':
          description: Updated publication plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostPublication'
  /api/v1/posts/variants/{variantId}/metrics:
    get:
      operationId: listPostVariantMetrics
      summary: List Variant Metric Observations
      tags:
        - Posts
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/VariantId'
      responses:
        '200':
          description: Metric observations for the variant publication
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricObservationListResponse'
    post:
      operationId: recordPostVariantMetric
      summary: Record Variant Metric Observation
      tags:
        - Posts
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/VariantId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MetricObservationInput'
      responses:
        '201':
          description: Recorded metric observation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricObservation'
  /api/v1/posts/metric-definitions:
    get:
      operationId: listPostMetricDefinitions
      summary: List Metric Definitions
      tags:
        - Posts
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - in: query
          name: platform
          schema:
            type: string
        - in: query
          name: surface
          schema:
            type: string
      responses:
        '200':
          description: Metric definitions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricDefinitionListResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT authentication token
  parameters:
    WorkspaceHeader:
      in: header
      name: X-Workspace-ID
      required: true
      schema:
        type: string
        format: uuid
    ResourceId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid
    VariantId:
      in: path
      name: variantId
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - timestamp
        - version
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
          description: Overall health status
        timestamp:
          type: string
          format: date-time
          description: Current server timestamp
        uptime:
          type: string
          description: Server uptime duration
        version:
          type: string
          description: API version
        go:
          $ref: '#/components/schemas/GoInfo'
        checks:
          type: object
          additionalProperties:
            type: string
          description: Individual service health checks

    GoInfo:
      type: object
      properties:
        version:
          type: string
          description: Go runtime version
        os:
          type: string
          description: Operating system
        arch:
          type: string
          description: CPU architecture
        num_cpu:
          type: integer
          description: Number of CPUs
        goroutines:
          type: integer
          description: Active goroutines count

    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: boolean
          example: true
        message:
          type: string
          description: Error message
        code:
          type: string
          description: Error code for programmatic handling
        details:
          type: object
          additionalProperties: true
          description: Additional error details
    ResourceCapabilityMatrix:
      type: object
      properties:
        rules:
          type: array
          items:
            $ref: '#/components/schemas/ResourceCapabilityRule'
    ResourceCapabilityRule:
      type: object
      properties:
        platform:
          type: string
        surface:
          type: string
        label:
          type: string
        accepts:
          type: array
          items:
            type: string
        hardLimit:
          type: array
          items:
            type: string
        preferred:
          type: array
          items:
            type: string
        supportedContentKinds:
          type: array
          items:
            type: string
            enum: [text, article, thread]
        assetRequired:
          type: boolean
        minItems:
          type: integer
        maxItems:
          type: integer
    ResourceCompatibility:
      type: object
      properties:
        platform:
          type: string
        surface:
          type: string
        status:
          type: string
          enum: [supported, warning, unsupported]
        reasons:
          type: array
          items:
            type: string
    ResourceRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        parentResourceId:
          type: string
          format: uuid
        mediaKind:
          type: string
          enum: [image, video, document]
        sourceType:
          type: string
        lifecycleStatus:
          type: string
        displayName:
          type: string
        originalName:
          type: string
        mimeType:
          type: string
        fileExtension:
          type: string
        checksumSha256:
          type: string
        sizeBytes:
          type: integer
          format: int64
        widthPx:
          type: integer
        heightPx:
          type: integer
        pageCount:
          type: integer
        optimized:
          type: boolean
        storageBackend:
          type: string
        downloadUrl:
          type: string
        previewUrl:
          type: string
        usageCount:
          type: integer
        childCount:
          type: integer
        setCount:
          type: integer
        compatibility:
          type: array
          items:
            $ref: '#/components/schemas/ResourceCompatibility'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ResourceDetail:
      allOf:
        - $ref: '#/components/schemas/ResourceRecord'
        - type: object
          properties:
            variants:
              type: array
              items:
                $ref: '#/components/schemas/ResourceRecord'
            sets:
              type: array
              items:
                $ref: '#/components/schemas/ResourceSetSummary'
    ResourceListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ResourceRecord'
    ResourceSetItemInput:
      type: object
      properties:
        resourceId:
          type: string
          format: uuid
        role:
          type: string
        metadata:
          type: object
          additionalProperties: true
    ResourceSetSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        intentType:
          type: string
          enum: [generic, social_surface]
        intentPlatform:
          type: string
        intentSurface:
          type: string
        coverResourceId:
          type: string
          format: uuid
        coverPreviewUrl:
          type: string
        sourceType:
          type: string
        itemCount:
          type: integer
        membersPreview:
          type: array
          items:
            $ref: '#/components/schemas/ResourceRecord'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ResourceSetItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        resourceId:
          type: string
          format: uuid
        position:
          type: integer
        role:
          type: string
        metadata:
          type: object
          additionalProperties: true
        resource:
          $ref: '#/components/schemas/ResourceRecord'
    ResourceSetDetail:
      allOf:
        - $ref: '#/components/schemas/ResourceSetSummary'
        - type: object
          properties:
            metadata:
              type: object
              additionalProperties: true
            coverResource:
              $ref: '#/components/schemas/ResourceRecord'
            items:
              type: array
              items:
