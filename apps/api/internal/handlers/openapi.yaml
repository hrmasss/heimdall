openapi: 3.1.0
info:
  title: Heimdall API
  version: 0.1.0
  description: |
    Heimdall is a centralized social media management platform that brings 
    multiple social platforms into one unified dashboard.
    
    ## Features
    - Multi-platform social media management
    - Content planning and scheduling
    - Analytics and performance insights
    - AI-powered content generation
    - Team collaboration
    
    ## Authentication
    Most endpoints require authentication via Bearer token in the Authorization header.
  contact:
    name: Heimdall API Support
    email: api@heimdall.dev
  license:
    name: MIT
    identifier: MIT

servers:
  - url: http://localhost:8080
    description: Local development server
  - url: https://api.heimdall.dev
    description: Production server (future)

tags:
  - name: Health
    description: Health check and status endpoints
  - name: Auth
    description: Authentication and authorization
  - name: Workspaces
    description: Multi-tenant workspace management
  - name: Resources
    description: Workspace-scoped reusable media and capability registry
  - name: Posts
    description: Social media post management
  - name: Scheduling
    description: Content scheduling and calendar
  - name: Analytics
    description: Performance analytics and insights
  - name: Integrations
    description: Social platform integrations

paths:
  /api/v1/health:
    get:
      operationId: getHealth
      summary: Health Check
      description: Returns the health status of the API including uptime and system information.
      tags:
        - Health
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: healthy
                timestamp: "2026-03-06T12:00:00Z"
                uptime: "2h30m15s"
                version: "0.1.0"
                go:
                  version: "go1.24"
                  os: "darwin"
                  arch: "arm64"
                  num_cpu: 10
                  goroutines: 8
                checks:
                  api: "ok"
  /api/v1/resources/capabilities:
    get:
      operationId: getResourceCapabilities
      summary: List Resource Capabilities
      tags:
        - Resources
      security:
        - BearerAuth: []
      parameters:
        - in: header
          name: X-Workspace-ID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Resource capability matrix
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceCapabilityMatrix'
  /api/v1/resources:
    get:
      operationId: listResources
      summary: List Resources
      tags:
        - Resources
      security:
        - BearerAuth: []
      parameters:
        - in: header
          name: X-Workspace-ID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Workspace resources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceListResponse'
    post:
      operationId: uploadResource
      summary: Upload Resource
      tags:
        - Resources
      security:
        - BearerAuth: []
      parameters:
        - in: header
          name: X-Workspace-ID
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                displayName:
                  type: string
                sourceType:
                  type: string
                optimize:
                  type: boolean
                transformRecipe:
                  type: string
      responses:
        '201':
          description: Uploaded resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceUploadResponse'
  /api/v1/resources/{id}:
    get:
      operationId: getResource
      summary: Get Resource
      tags:
        - Resources
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Resource detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceDetail'
    delete:
      operationId: deleteResource
      summary: Delete Resource
      tags:
        - Resources
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '204':
          description: Resource queued for cleanup
  /api/v1/resources/{id}/download:
    get:
      operationId: downloadResource
      summary: Download Resource
      tags:
        - Resources
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '302':
          description: Redirects to a signed blob URL
  /api/v1/resources/{id}/variants:
    post:
      operationId: createResourceVariant
      summary: Create Resource Variant
      tags:
        - Resources
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/WorkspaceHeader'
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                displayName:
                  type: string
                optimize:
                  type: boolean
                transformRecipe:
                  type: string

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT authentication token
  parameters:
    WorkspaceHeader:
      in: header
      name: X-Workspace-ID
      required: true
      schema:
        type: string
        format: uuid
    ResourceId:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid

  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - timestamp
        - version
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
          description: Overall health status
        timestamp:
          type: string
          format: date-time
          description: Current server timestamp
        uptime:
          type: string
          description: Server uptime duration
        version:
          type: string
          description: API version
        go:
          $ref: '#/components/schemas/GoInfo'
        checks:
          type: object
          additionalProperties:
            type: string
          description: Individual service health checks

    GoInfo:
      type: object
      properties:
        version:
          type: string
          description: Go runtime version
        os:
          type: string
          description: Operating system
        arch:
          type: string
          description: CPU architecture
        num_cpu:
          type: integer
          description: Number of CPUs
        goroutines:
          type: integer
          description: Active goroutines count

    Error:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: boolean
          example: true
        message:
          type: string
          description: Error message
        code:
          type: string
          description: Error code for programmatic handling
        details:
          type: object
          additionalProperties: true
          description: Additional error details
    ResourceCapabilityMatrix:
      type: object
      properties:
        rules:
          type: array
          items:
            $ref: '#/components/schemas/ResourceCapabilityRule'
    ResourceCapabilityRule:
      type: object
      properties:
        platform:
          type: string
        surface:
          type: string
        label:
          type: string
        accepts:
          type: array
          items:
            type: string
        hardLimit:
          type: array
          items:
            type: string
        preferred:
          type: array
          items:
            type: string
        maxItems:
          type: integer
    ResourceCompatibility:
      type: object
      properties:
        platform:
          type: string
        surface:
          type: string
        status:
          type: string
          enum: [supported, warning, unsupported]
        reasons:
          type: array
          items:
            type: string
    ResourceRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        parentResourceId:
          type: string
          format: uuid
        mediaKind:
          type: string
          enum: [image, video, document]
        sourceType:
          type: string
        lifecycleStatus:
          type: string
        displayName:
          type: string
        originalName:
          type: string
        mimeType:
          type: string
        fileExtension:
          type: string
        checksumSha256:
          type: string
        sizeBytes:
          type: integer
          format: int64
        widthPx:
          type: integer
        heightPx:
          type: integer
        pageCount:
          type: integer
        optimized:
          type: boolean
        storageBackend:
          type: string
        downloadUrl:
          type: string
        previewUrl:
          type: string
        usageCount:
          type: integer
        childCount:
          type: integer
        compatibility:
          type: array
          items:
            $ref: '#/components/schemas/ResourceCompatibility'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ResourceDetail:
      allOf:
        - $ref: '#/components/schemas/ResourceRecord'
        - type: object
          properties:
            variants:
              type: array
              items:
                $ref: '#/components/schemas/ResourceRecord'
    ResourceListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ResourceRecord'
    ResourceUploadOptimization:
      type: object
      properties:
        applied:
          type: boolean
        originalSizeBytes:
          type: integer
          format: int64
        storedSizeBytes:
          type: integer
          format: int64
        savedBytes:
          type: integer
          format: int64
    ResourceUploadResponse:
      type: object
      properties:
        resource:
          $ref: '#/components/schemas/ResourceDetail'
        optimization:
          $ref: '#/components/schemas/ResourceUploadOptimization'
