services:
  app:
    image: ${HEIMDALL_IMAGE:-ghcr.io/hrmasss/heimdall:main}
    container_name: heimdall-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:18081:80"
    volumes:
      - /opt/heimdall/data/postgres:/var/lib/postgresql/data
      - /opt/heimdall/data/storage:/var/lib/heimdall/storage
