name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: heimdall_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d heimdall_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/heimdall_ci?sslmode=disable
      GO_ENV: test
      API_ALLOWED_ORIGINS: https://heimdall.social,https://www.heimdall.social,https://app.heimdall.social
      STORAGE_LOCAL_ROOT: ./tmp/storage-ci
      IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/heimdall
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Atlas
        run: |
          curl -fsSL https://atlasbinaries.com/atlas/atlas-linux-amd64-latest -o /usr/local/bin/atlas
          chmod +x /usr/local/bin/atlas
          atlas version

      - name: Validate migrations
        run: |
          atlas migrate validate --dir file://db/migrations
          atlas migrate apply --dir file://db/migrations --url "$DATABASE_URL" --tx-mode file --exec-order linear
        shell: bash

      - name: Seed and smoke check
        run: |
          go run ./cmd/server seed-system
          go run ./cmd/server healthcheck
          go test ./...
        working-directory: apps/api
        shell: bash

      - name: Typecheck and build frontend
        env:
          VITE_API_URL: https://api.heimdall.social
          VITE_SITE_URL: https://heimdall.social
        run: |
          pnpm --dir apps/web typecheck
          pnpm --dir apps/web build
        shell: bash

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VITE_API_URL=https://api.heimdall.social
            VITE_SITE_URL=https://heimdall.social
          tags: |
            ${{ env.IMAGE_REPO }}:${{ github.sha }}
            ${{ env.IMAGE_REPO }}:main

      - name: Prepare SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/id_heimdall
          chmod 600 ~/.ssh/id_heimdall
          ssh-keyscan -p "${{ secrets.PROD_SSH_PORT }}" "${{ secrets.PROD_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload deploy assets
        shell: bash
        run: |
          ssh -i ~/.ssh/id_heimdall -p "${{ secrets.PROD_SSH_PORT }}" "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" "mkdir -p /opt/heimdall"
          scp -i ~/.ssh/id_heimdall -P "${{ secrets.PROD_SSH_PORT }}" docker-compose.prod.yml scripts/deploy-production.sh "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:/opt/heimdall/"
          ssh -i ~/.ssh/id_heimdall -p "${{ secrets.PROD_SSH_PORT }}" "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" "chmod +x /opt/heimdall/deploy-production.sh"

      - name: Upload deploy environment
        shell: bash
        env:
          PROD_ENV_FILE_B64: ${{ secrets.PROD_ENV_FILE_B64 }}
          PROD_GEMINI_API_KEYS: ${{ secrets.PROD_GEMINI_API_KEYS }}
          PROD_TAVILY_API_KEYS: ${{ secrets.PROD_TAVILY_API_KEYS }}
        run: |
          runtime_env_file="$(mktemp)"
          printf '%s' "$PROD_ENV_FILE_B64" | base64 -d > "$runtime_env_file"
          upsert_env() {
            local key="$1"
            local value="$2"
            if [ -z "$value" ]; then
              return 0
            fi
            sed -i "/^${key}=/d" "$runtime_env_file"
            printf '%s=%s\n' "$key" "$value" >> "$runtime_env_file"
          }
          upsert_env GEMINI_API_KEYS "$PROD_GEMINI_API_KEYS"
          upsert_env TAVILY_API_KEYS "$PROD_TAVILY_API_KEYS"
          runtime_env_b64="$(base64 -w0 "$runtime_env_file")"
          {
            printf 'PROD_ENV_FILE_B64=%s\n' "$runtime_env_b64"
            printf 'GHCR_USERNAME=%s\n' '${{ github.actor }}'
            printf 'GHCR_TOKEN=%s\n' '${{ secrets.GITHUB_TOKEN }}'
          } > deploy.env
          rm -f "$runtime_env_file"
          scp -i ~/.ssh/id_heimdall -P "${{ secrets.PROD_SSH_PORT }}" deploy.env "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}:/opt/heimdall/deploy.env"

      - name: Deploy to production
        shell: bash
        run: |
          IMAGE="${IMAGE_REPO}:${GITHUB_SHA}"
          ssh -i ~/.ssh/id_heimdall -p "${{ secrets.PROD_SSH_PORT }}" "${{ secrets.PROD_SSH_USER }}@${{ secrets.PROD_SSH_HOST }}" "
            set -euo pipefail
            set -a
            . /opt/heimdall/deploy.env
            set +a
            /opt/heimdall/deploy-production.sh '$IMAGE'
            rm -f /opt/heimdall/deploy.env
          "

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.PROD_DISCORD_WEBHOOK_URL }}
          DEPLOY_STATUS: ${{ job.status }}
          WORKFLOW_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "Discord webhook secret is not configured; skipping notification."
            exit 0
          fi

          if [ "${DEPLOY_STATUS}" = "success" ]; then
            COLOR=5763719
          elif [ "${DEPLOY_STATUS}" = "failure" ]; then
            COLOR=15548997
          else
            COLOR=16705372
          fi

          payload=$(cat <<EOF
          {
            "username": "Heimdall Deploy",
            "embeds": [
              {
                "title": "Production deployment ${DEPLOY_STATUS}",
                "url": "${WORKFLOW_URL}",
                "color": ${COLOR},
                "fields": [
                  { "name": "Repository", "value": "\`${GITHUB_REPOSITORY}\`", "inline": true },
                  { "name": "Branch", "value": "\`${GITHUB_REF_NAME}\`", "inline": true },
                  { "name": "Actor", "value": "\`${GITHUB_ACTOR}\`", "inline": true },
                  { "name": "Commit", "value": "\`${GITHUB_SHA}\`", "inline": false },
                  { "name": "Workflow", "value": "[Open run](${WORKFLOW_URL})", "inline": false }
                ]
              }
            ]
          }
          EOF
          )

          curl --fail --show-error --silent \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "${DISCORD_WEBHOOK_URL}"
